<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard-Pro | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css"> <!-- pake CSS lo sendiri kalau mau -->
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f7fafc;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 { font-size:28px; margin-bottom:10px; }
        .user-info { background:#edf2f7; padding:15px; border-radius:12px; margin:20px 0; }
        .stats { display:grid; grid-template-columns:repeat(auto-fit, minmax(150px,1fr)); gap:20px; margin:30px 0; }
        .stat-card { background:#667eea; color:white; padding:20px; border-radius:16px; text-align:center; }
        .stat-number { font-size:32px; font-weight:bold; }
        button { background:#e53e3e; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer; font-weight:600; }
        button:hover { background:#c53030; }
        .footer { margin-top:30px; text-align:center; color:#718096; font-size:14px; }
    </style>
</head>
<body>
<div class="container">
    <h1>📊 Dashboard</h1>
    <div class="user-info" id="userInfo"></div>
    <div class="stats">
        <div class="stat-card"><div class="stat-number">12</div><div>Total Produk</div></div>
        <div class="stat-card"><div class="stat-number">5</div><div>Pesanan Masuk</div></div>
        <div class="stat-card"><div class="stat-number">Rp 2.5jt</div><div>Omset Bulan Ini</div></div>
    </div>
    <button id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Keluar</button>
    <div class="footer">✨ Demo Dashboard - Data statis untuk prototype</div>
</div>
<script>
    const loggedUser = localStorage.getItem('loggedInUser');
    if (!loggedUser) {
        alert('Silakan login terlebih dahulu.');
        window.location.href = 'index.html';
    } else {
        document.getElementById('userInfo').innerHTML = `<i class="fas fa-user-circle"></i> Selamat datang, <strong>${loggedUser}</strong>!`;
    }
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('loggedInUser');
        window.location.href = 'index.html';
    });
</script>
</body>
</html>
