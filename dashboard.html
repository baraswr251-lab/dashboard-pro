<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Digital Manager Pro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>

<div class="d-flex" id="wrapper">
    <div class="bg-dark text-white" id="sidebar-wrapper">
        <div class="sidebar-heading text-center py-4 primary-text fs-4 fw-bold text-uppercase border-bottom">
            <i class="fas fa-bolt me-2"></i>DigiPro
        </div>
        <div class="list-group list-group-flush my-3">
            <a href="#" class="list-group-item list-group-item-action bg-transparent second-text active"><i
                    class="fas fa-tachometer-alt me-2"></i>Dashboard</a>
            <a href="#" class="list-group-item list-group-item-action bg-transparent second-text fw-bold"><i
                    class="fas fa-box me-2"></i>Produk</a>
            <a href="#" class="list-group-item list-group-item-action bg-transparent second-text fw-bold"><i
                    class="fas fa-chart-line me-2"></i>Statistik</a>
            <a href="#" id="btnLogout" class="list-group-item list-group-item-action bg-transparent text-danger fw-bold"><i
                    class="fas fa-power-off me-2"></i>Logout</a>
        </div>
    </div>

    <div id="page-content-wrapper">
        <nav class="navbar navbar-expand-lg navbar-light bg-transparent py-4 px-4">
            <div class="d-flex align-items-center">
                <i class="fas fa-align-left primary-text fs-4 me-3" id="menu-toggle"></i>
                <h2 class="fs-2 m-0">Dashboard Utama</h2>
            </div>
        </nav>

        <div class="container-fluid px-4">
            <div class="row g-3 my-2">
                <div class="col-md-4">
                    <div class="p-3 bg-white shadow-sm d-flex justify-content-around align-items-center rounded-4 card-stat">
                        <div>
                            <h3 class="fs-2" id="totalProducts">0</h3>
                            <p class="fs-5 text-muted">Total Produk</p>
                        </div>
                        <i class="fas fa-box fs-1 primary-text border rounded-full secondary-bg p-3"></i>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="p-3 bg-white shadow-sm d-flex justify-content-around align-items-center rounded-4 card-stat">
                        <div>
                            <h3 class="fs-2" id="totalStock">0</h3>
                            <p class="fs-5 text-muted">Total Stok</p>
                        </div>
                        <i class="fas fa-warehouse fs-1 primary-text border rounded-full secondary-bg p-3"></i>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="p-3 bg-white shadow-sm d-flex justify-content-around align-items-center rounded-4 card-stat">
                        <div>
                            <h3 class="fs-2">Rp <span id="totalValue">0</span></h3>
                            <p class="fs-5 text-muted">Nilai Aset</p>
                        </div>
                        <i class="fas fa-money-bill-wave fs-1 primary-text border rounded-full secondary-bg p-3"></i>
                    </div>
                </div>
            </div>

            <div class="row my-5">
                <h3 class="fs-4 mb-3">Manajemen Inventaris</h3>
                <div class="col">
                    <div class="bg-white p-4 rounded-4 shadow-sm">
                        <p class="text-muted">Data akan muncul di sini setelah Modul C dipasang.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/auth.js"></script>
<script>
    // PROTEKSI: Cek akses sebelum halaman tampil
    checkAccess();

    // Script Logout
    document.getElementById('btnLogout').addEventListener('click', () => {
        localStorage.removeItem('isLoggedIn');
        localStorage.removeItem('currentUser');
        window.location.href = 'index.html';
    });
</script>
</body>
</html>
