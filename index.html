<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DigiPro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: #f8f9fa; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 25px rgba(0,0,0,0.1); background: #fff; }
    </style>
</head>
<body>

<div class="login-card text-center">
    <h3 class="fw-bold mb-4" id="authTitle">Login / Daftar</h3>
    
    <form id="authForm">
        <div class="mb-3 text-start">
            <label class="form-label">Username</label>
            <input type="text" id="userInput" class="form-control" required>
        </div>
        <div class="mb-4 text-start">
            <label class="form-label">Password</label>
            <input type="password" id="passInput" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Masuk / Daftar</button>
    </form>
</div>

<script src="js/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    // Logika panggil handleAuth saat tombol submit diklik
    document.getElementById('authForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const u = document.getElementById('userInput').value;
        const p = document.getElementById('passInput').value;

        // Panggil fungsi dari auth.js
        const hasil = handleAuth(u, p);

        if (hasil === "DAFTAR_SUKSES" || hasil === "LOGIN_SUKSES") {
            window.location.href = 'dashboard.html';
        } else {
            Swal.fire('Gagal!', 'Password salah, Bos!', 'error');
        }
    });
</script>
</body>
</html>
