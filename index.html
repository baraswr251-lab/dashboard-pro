<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DigiPro</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: #f0f2f5; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card { 
            width: 90%; 
            max-width: 400px; 
            padding: 2.5rem 2rem; 
            border-radius: 1.5rem; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            background: #fff; 
            text-align: center;
        }
        .icon-box {
            width: 70px;
            height: 70px;
            background: #0d6efd;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 1.8rem;
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.3);
        }
        .form-control {
            border-radius: 0.8rem;
            padding: 0.75rem 1rem;
            border: 1px solid #ddd;
        }
        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.1);
            border-color: #0d6efd;
        }
        .btn-primary {
            border-radius: 0.8rem;
            padding: 0.75rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="icon-box">
        <i class="fas fa-bolt"></i>
    </div>
    
    <h3 class="fw-bold mb-1" id="authTitle">Menghubungkan...</h3>
    <p class="text-muted mb-4" id="authSubtitle">Silakan tunggu sebentar</p>

    <form id="authForm">
        <div class="mb-3 text-start">
            <label class="form-label small fw-bold text-secondary">Username</label>
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0"><i class="fas fa-user text-muted"></i></span>
                <input type="text" id="userInput" class="form-control border-start-0" placeholder="Username" required>
            </div>
        </div>
        <div class="mb-4 text-start">
            <label class="form-label small fw-bold text-secondary">Password</label>
            <div class="input-group">
                <span class="input-group-text bg-white border-end-0"><i class="fas fa-lock text-muted"></i></span>
                <input type="password" id="passInput" class="form-control border-start-0" placeholder="••••••••" required>
            </div>
        </div>
        
        <button type="submit" id="authBtn" class="btn btn-primary w-100 shadow-sm">
            Lanjutkan
        </button>
    </form>
</div>

<script src="js/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    // 1. Inisialisasi Tampilan Berdasarkan Kondisi User
    document.addEventListener('DOMContentLoaded', () => {
        const registered = localStorage.getItem('registeredUser');
        const title = document.getElementById('authTitle');
        const subtitle = document.getElementById('authSubtitle');
        const btn = document.getElementById('authBtn');

        if (!registered) {
            title.innerText = "Daftar Akun";
            subtitle.innerText = "Input pertama akan menjadi akun tetap Anda";
            btn.innerText = "Daftar & Masuk";
        } else {
            title.innerText = "Selamat Datang";
            subtitle.innerText = "Silakan login ke dashboard Anda";
            btn.innerText = "Masuk Sekarang";
        }
    });

    // 2. Logika Submit Form
    document.getElementById('authForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const u = document.getElementById('userInput').value;
        const p = document.getElementById('passInput').value;

        // Panggil handleAuth dari file auth.js
        const result = handleAuth(u, p);

        if (result === "DAFTAR_SUKSES") {
            Swal.fire({
                icon: 'success',
                title: 'Akun Berhasil Dibuat!',
                text: 'Mengarahkan ke Dashboard...',
                timer: 2000,
                showConfirmButton: false
            }).then(() => {
                window.location.href = 'dashboard.html';
            });
        } 
        else if (result === "LOGIN_SUKSES") {
            window.location.href = 'dashboard.html';
        } 
        else if (result === "SALAH_PASSWORD") {
            Swal.fire({
                icon: 'error',
                title: 'Gagal Masuk',
                text: 'Password yang Anda masukkan salah!',
                confirmButtonColor: '#0d6efd'
            });
        }
    });
</script>

</body>
</html>
