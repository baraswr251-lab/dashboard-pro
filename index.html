<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigiPro | Login & Registrasi</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/dashboard.css"> <!-- pakai CSS lo sendiri kalau mau -->
    <style>
        /* CSS dari gue (bisa ditimpa atau dihapus kalau pakai dashboard.css) */
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            width: 100%;
            max-width: 450px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }
        .tab {
            flex:1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-weight: 600;
            color: #666;
        }
        .tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }
        .form { display: none; }
        .form.active { display: block; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { background: #5a67d8; transform:translateY(-2px); }
        .error { color: #e53e3e; font-size:12px; margin:5px 0; }
        .success { font-size:14px; text-align:center; margin-top:15px; }
        .info { text-align:center; margin-top:20px; font-size:12px; color:#888; }
        @media (max-width:480px){ .card{padding:25px;} }
    </style>
</head>
<body>
<div class="card">
    <h2 style="text-align:center; margin-bottom:20px;">DigiPro</h2>
    <div class="tabs">
        <div class="tab active" data-tab="login">Masuk</div>
        <div class="tab" data-tab="register">Daftar</div>
    </div>

    <div id="loginForm" class="form active">
        <input type="email" id="loginEmail" placeholder="Email">
        <div class="error" id="loginEmailError"></div>
        <input type="password" id="loginPassword" placeholder="Password">
        <div class="error" id="loginPasswordError"></div>
        <button id="loginBtn">Masuk Sekarang</button>
        <div id="loginMessage" class="success"></div>
    </div>

    <div id="registerForm" class="form">
        <input type="email" id="regEmail" placeholder="Email">
        <div class="error" id="regEmailError"></div>
        <input type="password" id="regPassword" placeholder="Password (min. 6)">
        <div class="error" id="regPasswordError"></div>
        <input type="password" id="regConfirm" placeholder="Konfirmasi Password">
        <div class="error" id="regConfirmError"></div>
        <button id="registerBtn">Simpan Akun</button>
        <div id="registerMessage" class="success"></div>
    </div>
    <div class="info">✨ Data disimpan di browser (demo)</div>
</div>

<script>
    const tabs = document.querySelectorAll('.tab');
    const loginFormDiv = document.getElementById('loginForm');
    const registerFormDiv = document.getElementById('registerForm');
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            if (tab.dataset.tab === 'login') {
                loginFormDiv.classList.add('active');
                registerFormDiv.classList.remove('active');
            } else {
                loginFormDiv.classList.remove('active');
                registerFormDiv.classList.add('active');
            }
        });
    });

    function getUsers() { return JSON.parse(localStorage.getItem('users')) || []; }
    function saveUsers(users) { localStorage.setItem('users', JSON.stringify(users)); }

    // REGISTER
    document.getElementById('registerBtn').addEventListener('click', () => {
        let valid = true;
        const email = document.getElementById('regEmail').value.trim();
        const pass = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;

        document.getElementById('regEmailError').innerText = '';
        document.getElementById('regPasswordError').innerText = '';
        document.getElementById('regConfirmError').innerText = '';
        document.getElementById('registerMessage').innerText = '';

        if (!email.includes('@')) {
            document.getElementById('regEmailError').innerText = 'Email harus mengandung @';
            valid = false;
        }
        if (pass.length < 6) {
            document.getElementById('regPasswordError').innerText = 'Password minimal 6 karakter';
            valid = false;
        }
        if (pass !== confirm) {
            document.getElementById('regConfirmError').innerText = 'Password tidak cocok';
            valid = false;
        }
        if (!valid) return;

        const users = getUsers();
        if (users.find(u => u.email === email)) {
            document.getElementById('registerMessage').innerText = 'Email sudah terdaftar!';
            document.getElementById('registerMessage').style.color = '#e53e3e';
            return;
        }
        users.push({ email, password: pass });
        saveUsers(users);
        document.getElementById('registerMessage').innerText = '✅ Registrasi berhasil! Silakan login.';
        document.getElementById('registerMessage').style.color = '#38a169';
        document.getElementById('regEmail').value = '';
        document.getElementById('regPassword').value = '';
        document.getElementById('regConfirm').value = '';
        setTimeout(() => {
            document.querySelector('.tab[data-tab="login"]').click();
        }, 1000);
    });

    // LOGIN
    document.getElementById('loginBtn').addEventListener('click', () => {
        const email = document.getElementById('loginEmail').value.trim();
        const pass = document.getElementById('loginPassword').value;
        document.getElementById('loginEmailError').innerText = '';
        document.getElementById('loginPasswordError').innerText = '';
        document.getElementById('loginMessage').innerText = '';

        if (!email.includes('@')) {
            document.getElementById('loginEmailError').innerText = 'Email harus mengandung @';
            return;
        }
        if (pass.length < 6) {
            document.getElementById('loginPasswordError').innerText = 'Password minimal 6 karakter';
            return;
        }
        const users = getUsers();
        const user = users.find(u => u.email === email && u.password === pass);
        if (user) {
            localStorage.setItem('loggedInUser', email);
            document.getElementById('loginMessage').innerText = '✅ Login berhasil! Mengarahkan ke dashboard...';
            document.getElementById('loginMessage').style.color = '#38a169';
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
        } else {
            document.getElementById('loginMessage').innerText = 'Email atau password salah.';
            document.getElementById('loginMessage').style.color = '#e53e3e';
        }
    });
</script>
</body>
</html>
